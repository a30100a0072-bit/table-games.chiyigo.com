# /wrangler.toml

name               = "big-two-game"
main               = "src/index.ts"
compatibility_date = "2024-09-23"

# ── Migrations (free plan requires new_sqlite_classes) ────────────────── # L3_架構含防禦觀測
[[migrations]]
tag                 = "v1"
new_sqlite_classes  = ["GameRoomDO", "LobbyDO"]

[[migrations]]
tag                 = "v2"
new_sqlite_classes  = ["TournamentDO"]

# ── Durable Objects ───────────────────────────────────────────────────── # L3_架構含防禦觀測
[[durable_objects.bindings]]
name       = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects.bindings]]
name       = "LOBBY_DO"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name       = "TOURNAMENT_DO"
class_name = "TournamentDO"

# ── Queues ────────────────────────────────────────────────────────────── # L3_架構含防禦觀測
[[queues.producers]]
binding = "SETTLEMENT_QUEUE"
queue   = "big-two-settlement"

[[queues.consumers]]
queue          = "big-two-settlement"
max_batch_size = 10
max_retries    = 3

# ── KV Namespaces ─────────────────────────────────────────────────────── # L2_隔離
[[kv_namespaces]]
binding = "MATCH_KV"
id      = "f39f8ece59464ec782a3c7ddc4be8488"

# ── D1 Database ───────────────────────────────────────────────────────── # L3_架構含防禦觀測
[[d1_databases]]
binding       = "DB"
database_name = "big-two-db"
database_id   = "f064af01-8e5e-4d49-9dcc-bc56c2b7d55c"

# ── Production environment ────────────────────────────────────────────── # L2_隔離
# Bindings must be repeated under [env.production] — wrangler does not
# inherit top-level bindings into named environments.
[env.production]
name = "big-two-game-production"

[[env.production.durable_objects.bindings]]
name       = "GAME_ROOM"
class_name = "GameRoomDO"

[[env.production.durable_objects.bindings]]
name       = "LOBBY_DO"
class_name = "LobbyDO"

[[env.production.durable_objects.bindings]]
name       = "TOURNAMENT_DO"
class_name = "TournamentDO"

[[env.production.queues.producers]]
binding = "SETTLEMENT_QUEUE"
queue   = "big-two-settlement"

[[env.production.queues.consumers]]
queue          = "big-two-settlement"
max_batch_size = 10
max_retries    = 3

[[env.production.kv_namespaces]]
binding = "MATCH_KV"
id      = "f39f8ece59464ec782a3c7ddc4be8488"

[[env.production.d1_databases]]
binding       = "DB"
database_name = "big-two-db"
database_id   = "f064af01-8e5e-4d49-9dcc-bc56c2b7d55c"

# ── Secrets ───────────────────────────────────────────────────────────── # L2_隔離
# JWT_PRIVATE_JWK is a JSON-serialised EC P-256 private JWK with a `kid`.
# Generate one with:  npm run gen:jwk
# Then upload:        wrangler secret put JWT_PRIVATE_JWK --env production
# The matching public key is published at /.well-known/jwks.json.

# ── Logpush / Tail ────────────────────────────────────────────────────── # L3_架構含防禦觀測
# Structured JSON logs (utils/log.ts) emit token_issued / settlement_written /
# tournament_* / admin_* / rate_limited events. They flow to:
#   • the main worker stdout (visible via `wrangler tail`),
#   • the `big-two-log-forwarder` tail consumer below, which POSTs warn/error
#     and audit-event lines to a webhook (Discord / Slack / generic).
#
# Forwarder lifecycle is independent — see wrangler.forwarder.toml. Deploy
# the forwarder before referencing it here, or this worker's deploy fails
# with "service not found".
#
# Logpush (paid plan) is still an option in parallel for archival; configure
# via dashboard → Workers & Pages → big-two-game-production → Logs.

[[env.production.tail_consumers]]
service = "big-two-log-forwarder"

# ── Cron Triggers ─────────────────────────────────────────────────────── # L3_架構含防禦觀測
# Daily retention sweep — prunes expired tokens / invites / shares and
# DMs older than 7 days. See src/workers/cronCleanup.ts for the SQL.
# Cron is UTC; 03:17 keeps the sweep off round-hour spikes that other
# Cloudflare account-level jobs tend to share.
[triggers]
crons = ["17 3 * * *"]

[env.production.triggers]
crons = ["17 3 * * *"]
